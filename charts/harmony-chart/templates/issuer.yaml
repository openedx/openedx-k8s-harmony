{{ if index .Values "cert-manager" "enabled" }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: harmony-letsencrypt-global
spec:
  acme:
    {{- if .Values.notificationEmail }}
    email: {{ .Values.notificationEmail }}
    {{- end }}
    privateKeySecretRef:
      name: harmony-letsencrypt-global
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
    - http01:
        ingress:
          {{- if index .Values "ingress-nginx" "enabled" -}}
          class: {{ (index .Values "ingress-nginx" "controller" "ingressClass") }}
          {{- else if .Values.traefik.enabled -}}
          class: {{ .Values.traefik.ingressClass.name }}
          {{- end -}}
{{ end }}
